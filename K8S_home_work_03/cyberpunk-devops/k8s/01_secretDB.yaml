# В реальном проекте этот файл НЕ должен коммититься в git с реальными паролями.
# Лучше создавать секрет императивно:
#   kubectl create secret generic db-credentials -n cyberpunk \
#     --from-literal=DB_HOST=mariadb \
#     --from-literal=DB_USER=cyberpunk \
#     --from-literal=DB_PASSWORD='SecurePass2025!' \
#     --from-literal=DB_NAME=cyberpunk_db \
#     --from-literal=MYSQL_ROOT_PASSWORD='RootSecurePass2025!'
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: cyberpunk
type: Opaque
stringData:
  DB_HOST: mariadb
  DB_USER: cyberpunk
  DB_PASSWORD: "SecurePass2025!"
  DB_NAME: cyberpunk_db
  MYSQL_ROOT_PASSWORD: "RootSecurePass2025!"
